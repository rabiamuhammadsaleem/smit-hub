<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Lost & Found - SMIT Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-smit">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">🏫 SMIT Hub - Lost & Found</a>
            <div class="d-flex gap-2">
                <button class="btn btn-light btn-sm d-none d-sm-block" data-bs-toggle="modal" data-bs-target="#postItemModal">📝 Post New Item</button>
                <button class="btn btn-light btn-sm d-sm-none" data-bs-toggle="modal" data-bs-target="#postItemModal">📝</button>
                <a href="dashboard.html" class="btn btn-light btn-sm">🏠</a>
                <button class="btn btn-light btn-sm" id="logoutBtn">🚪</button>
            </div>
        </div>
    </nav>
    
    <div class="container mt-3 mt-sm-4">
        <h4 class="mb-3">🔍 All Lost & Found Items</h4>
        <div class="row g-3" id="itemsList">Loading...</div>
    </div>

    <!-- Post Item Modal with Image Upload -->
    <div class="modal fade" id="postItemModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, #66b032, #0057a8); color: white;">
                    <h5 class="modal-title">📝 Post New Item</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="postItemForm">
                        <div class="mb-3">
                            <label>Item Type</label>
                            <select id="itemType" class="form-control">
                                <option value="lost">🔴 Lost Item</option>
                                <option value="found">🟢 Found Item</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Title</label>
                            <input type="text" id="title" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Description</label>
                            <textarea id="description" class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label>Upload Image</label>
                            <input type="file" id="itemImage" class="form-control" accept="image/*">
                            <small class="text-muted">Upload JPG, PNG or GIF (Max 2MB)</small>
                        </div>
                        <div id="imagePreview" class="mb-3" style="display:none;">
                            <img id="previewImg" style="max-height:100px; border-radius:10px;">
                        </div>
                        <button type="submit" class="btn btn-smit-success w-100">📤 Post Item</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Raise Hand Modal -->
    <div class="modal fade" id="raiseHandModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, #66b032, #0057a8); color: white;">
                    <h5 class="modal-title">👋 Raise Hand - Claim Item</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="claimItemId">
                    <div class="mb-3">
                        <label>Your Name</label>
                        <input type="text" id="claimantName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Message (Optional)</label>
                        <textarea id="claimMessage" class="form-control" rows="3" placeholder="Why this item belongs to you?"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-smit-success" id="submitClaimBtn">Submit Claim</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/lost-found.js"></script>
</body>
</html>
