<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaints - SMIT Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-smit">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">🏫 SMIT Hub - Complaints</a>
            <div class="d-flex gap-2">
                <button class="btn btn-light btn-sm" data-bs-toggle="modal" data-bs-target="#complaintModal">📝 Submit</button>
                <a href="dashboard.html" class="btn btn-light btn-sm">🏠</a>
                <button class="btn btn-light btn-sm" id="logoutBtn">🚪</button>
            </div>
        </div>
    </nav>
    <div class="container mt-3 mt-sm-4">
        <h4 class="mb-3">📋 My Complaints <span id="complaintCount" class="badge bg-primary">0</span></h4>
        <div class="row g-3" id="complaintsList">Loading...</div>
    </div>
    <!-- Submit Complaint Modal -->
    <div class="modal fade" id="complaintModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" style="background: linear-gradient(135deg, #66b032, #0057a8); color: white;">
                    <h5 class="modal-title">📝 Submit Complaint</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="complaintForm">
                        <div class="mb-3"><label>Category</label><select id="category" class="form-control"><option>Internet Issue</option><option>Electricity Problem</option><option>Water Supply</option><option>Maintenance Required</option><option>Other</option></select></div>
                        <div class="mb-3"><label>Description</label><textarea id="description" class="form-control" rows="4" required></textarea></div>
                        <button type="submit" class="btn btn-smit-success w-100">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/complaints.js"></script>
</body>
</html>
