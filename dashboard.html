<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SMIT Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-smit">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🏫 SMIT Hub</a>
            <div class="dropdown">
                <button class="btn btn-light dropdown-toggle" data-bs-toggle="dropdown">👤 <span id="userEmail">Loading...</span></button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="admin.html">👑 Admin Panel</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><button class="dropdown-item" id="logoutBtn">🚪 Logout</button></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2 class="mb-4 text-center">Welcome to <span style="color:#66b032">SMIT</span> <span style="color:#0057a8">Hub</span> 🎯</h2>
        <div class="row justify-content-center">
            <div class="col-6 col-md-3 mb-3">
                <div class="card card-smit text-center p-3 p-md-4" onclick="location.href='lost-found.html'">
                    <h1>🔍</h1>
                    <h5>Lost & Found</h5>
                    <p class="small d-none d-sm-block">Post or find lost items</p>
                    <button class="btn btn-sm btn-smit-primary mt-2">Open →</button>
                </div>
            </div>
            <div class="col-6 col-md-3 mb-3">
                <div class="card card-smit text-center p-3 p-md-4" onclick="location.href='complaints.html'">
                    <h1>📝</h1>
                    <h5>Complaints</h5>
                    <p class="small d-none d-sm-block">Submit campus complaints</p>
                    <button class="btn btn-sm btn-smit-primary mt-2">Open →</button>
                </div>
            </div>
            <div class="col-6 col-md-3 mb-3">
                <div class="card card-smit text-center p-3 p-md-4" onclick="location.href='volunteer.html'">
                    <h1>🤝</h1>
                    <h5>Volunteer</h5>
                    <p class="small d-none d-sm-block">Register for events</p>
                    <button class="btn btn-sm btn-smit-primary mt-2">Open →</button>
                </div>
            </div>
            <div class="col-6 col-md-3 mb-3">
                <div class="card card-smit text-center p-3 p-md-4" onclick="location.href='admin.html'">
                    <h1>👑</h1>
                    <h5>Admin Panel</h5>
                    <p class="small d-none d-sm-block">Manage everything</p>
                    <button class="btn btn-sm btn-smit-primary mt-2">Open →</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
