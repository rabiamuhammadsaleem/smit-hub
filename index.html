<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMIT Hub - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --smit-green: #66b032; --smit-blue: #0057a8; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .auth-card { max-width: 450px; margin: 50px auto; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); background: white; }
        .auth-header { background: linear-gradient(135deg, var(--smit-green), var(--smit-blue)); color: white; padding: 30px; text-align: center; }
        .btn-smit-primary { background: var(--smit-blue); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; }
        .btn-smit-primary:hover { background: #004080; }
        .btn-smit-success { background: var(--smit-green); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; }
        .btn-smit-success:hover { background: #4a8a20; }
        .nav-tabs .nav-link { color: var(--smit-blue); font-weight: bold; }
        .nav-tabs .nav-link.active { color: var(--smit-green); border-bottom: 3px solid var(--smit-green); }
        .form-control { border-radius: 10px; padding: 10px 15px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .alert-notify { position: fixed; top: 20px; right: 20px; z-index: 9999; min-width: 280px; animation: slideIn 0.3s ease; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row min-vh-100 align-items-center justify-content-center">
            <div class="col-11 col-sm-10 col-md-6 col-lg-5">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2 class="mb-0">🏫 SMIT Hub</h2>
                        <p class="mb-0 mt-2">Saylani Mass IT Portal</p>
                    </div>
                    <div class="card-body p-3 p-sm-4">
                        <ul class="nav nav-tabs mb-4">
                            <li class="nav-item flex-fill text-center"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#loginTab">🔐 Login</button></li>
                            <li class="nav-item flex-fill text-center"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#signupTab">📝 Sign Up</button></li>
                        </ul>
                        <div class="tab-content">
                            <div class="tab-pane fade show active" id="loginTab">
                                <form id="loginForm">
                                    <div class="mb-3"><label>Email</label><input type="email" id="loginEmail" class="form-control" required></div>
                                    <div class="mb-3"><label>Password</label><input type="password" id="loginPassword" class="form-control" required></div>
                                    <button type="submit" class="btn-smit-primary">Login</button>
                                </form>
                            </div>
                            <div class="tab-pane fade" id="signupTab">
                                <form id="signupForm">
                                    <div class="mb-3"><label>Email</label><input type="email" id="signupEmail" class="form-control" required></div>
                                    <div class="mb-3"><label>Password</label><input type="password" id="signupPassword" class="form-control" required></div>
                                    <div class="mb-3"><label>Confirm Password</label><input type="password" id="signupConfirm" class="form-control" required></div>
                                    <button type="submit" class="btn-smit-success">Create Account</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { supabase } from './js/supabase.js'
        import { showNotification } from './js/common.js'
        
        // SIGNUP
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            const email = document.getElementById('signupEmail').value
            const password = document.getElementById('signupPassword').value
            const confirm = document.getElementById('signupConfirm').value
            
            if (password !== confirm) {
                showNotification('Passwords do not match!', 'error')
                return
            }
            if (password.length < 6) {
                showNotification('Password must be at least 6 characters', 'error')
                return
            }
            
            const { error } = await supabase.auth.signUp({ email, password })
            if (error) {
                showNotification(error.message, 'error')
            } else {
                showNotification('Account created! Please login.', 'success')
                document.getElementById('signupForm').reset()
                document.querySelector('[data-bs-target="#loginTab"]').click()
            }
        })
        
        // LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            const email = document.getElementById('loginEmail').value
            const password = document.getElementById('loginPassword').value
            
            const { data, error } = await supabase.auth.signInWithPassword({ email, password })
            if (error) {
                showNotification(error.message, 'error')
            } else {
                // Track login
                try {
                    await supabase.from('login_activity').insert([{
                        user_id: data.user.id,
                        user_email: data.user.email,
                        login_time: new Date()
                    }])
                } catch(e) { console.log(e) }
                
                showNotification('Login successful! Redirecting...', 'success')
                setTimeout(() => {
                    window.location.href = 'dashboard.html'
                }, 1000)
            }
        })
    </script>
</body>
</html>
