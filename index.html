<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SMIT Hub - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="container">
        <div class="row min-vh-100 align-items-center justify-content-center">
            <div class="col-11 col-sm-10 col-md-6 col-lg-5">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2 class="mb-0">🏫 SMIT Hub</h2>
                        <p class="mb-0 mt-2">Saylani Mass IT Portal</p>
                    </div>
                    <div class="card-body p-3 p-sm-4">
                        <div id="messageBox"></div>
                        <ul class="nav nav-tabs">
                            <li class="nav-item flex-fill text-center">
                                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#loginTab">🔐 Login</button>
                            </li>
                            <li class="nav-item flex-fill text-center">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#signupTab">📝 Sign Up</button>
                            </li>
                        </ul>
                        <div class="tab-content">
                            <div class="tab-pane fade show active" id="loginTab">
                                <form id="loginForm">
                                    <div class="mb-3">
                                        <label class="form-label">Email Address</label>
                                        <input type="email" id="loginEmail" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Password</label>
                                        <input type="password" id="loginPassword" class="form-control" required>
                                    </div>
                                    <button type="submit" class="btn-smit-primary">Login</button>
                                </form>
                            </div>
                            <div class="tab-pane fade" id="signupTab">
                                <form id="signupForm">
                                    <div class="mb-3">
                                        <label class="form-label">Email Address</label>
                                        <input type="email" id="signupEmail" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Password</label>
                                        <input type="password" id="signupPassword" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Confirm Password</label>
                                        <input type="password" id="signupConfirm" class="form-control" required>
                                    </div>
                                    <button type="submit" class="btn-smit-success">Create Account</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
